<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'unsafe-inline'; media-src *; img-src * data: content:;">
    <title>CR Wildlife - Contacto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/mobile-style.css">
</head>
<body class="mobile-app">
    <header class="app-header">
        <div class="header-content">
            <button class="back-button" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <img src="images/logo-icono.jpg" alt="CR Wildlife" class="app-logo" onerror="this.style.display='none'">
            <h1 class="app-title">Contacto</h1>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <img src="images/logo-icono.jpg" alt="CR Wildlife" class="menu-logo" onerror="this.style.display='none'">
            <h3>Costa Rica WildLife</h3>
            <button class="close-menu" id="closeMenu"><i class="fas fa-times"></i></button>
        </div>
        <ul class="menu-items">
            <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="about.html"><i class="fas fa-users"></i> Sobre Nosotros</a></li>
            <li><a href="services.html"><i class="fas fa-tree"></i> Servicios</a></li>
            <li><a href="gallery.html"><i class="fas fa-images"></i> Galería</a></li>
            <li><a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contacto</a></li>
        </ul>
        <div class="menu-lang">
            <button class="lang-btn" data-lang="es">ES</button>
            <span class="lang-separator">|</span>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="app-content">
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px;">
            <a href="#" onclick="makePhoneCall('+50672565865'); return false;" style="background:var(--bg-card); padding:14px 4px; border-radius:12px; text-align:center; border:1px solid var(--border-color); text-decoration:none; color:white;">
                <i class="fas fa-phone-alt" style="font-size:1.5rem; color:var(--accent-green);"></i>
                <span style="display:block; font-size:0.65rem; margin-top:4px;">Llamar</span>
            </a>
            <a href="#" onclick="openWhatsApp(); return false;" style="background:var(--bg-card); padding:14px 4px; border-radius:12px; text-align:center; border:1px solid var(--border-color); text-decoration:none; color:white;">
                <i class="fab fa-whatsapp" style="font-size:1.5rem; color:#25D366;"></i>
                <span style="display:block; font-size:0.65rem; margin-top:4px;">WhatsApp</span>
            </a>
            <a href="#" onclick="sendEmail(); return false;" style="background:var(--bg-card); padding:14px 4px; border-radius:12px; text-align:center; border:1px solid var(--border-color); text-decoration:none; color:white;">
                <i class="fas fa-envelope" style="font-size:1.5rem; color:var(--accent-green);"></i>
                <span style="display:block; font-size:0.65rem; margin-top:4px;">Email</span>
            </a>
            <a href="#" onclick="openFacebook(); return false;" style="background:var(--bg-card); padding:14px 4px; border-radius:12px; text-align:center; border:1px solid var(--border-color); text-decoration:none; color:white;">
                <i class="fab fa-facebook-f" style="font-size:1.5rem; color:#1877f2;"></i>
                <span style="display:block; font-size:0.65rem; margin-top:4px;">Facebook</span>
            </a>
        </div>

        <div style="background:var(--bg-card); border-radius:16px; padding:16px; margin-bottom:20px; border:1px solid var(--border-color);">
            <h3 style="color:var(--accent-green); margin-bottom:16px; text-align:center;">Envía un mensaje</h3>
            
            <form onsubmit="sendContactForm(event)" style="display:flex; flex-direction:column; gap:10px;">
                <input type="text" id="name" placeholder="Nombre completo" required style="padding:14px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:10px; color:white;">
                <input type="email" id="email" placeholder="Email" required style="padding:14px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:10px; color:white;">
                <input type="tel" id="phone" placeholder="Teléfono (opcional)" style="padding:14px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:10px; color:white;">
                <select id="service" style="padding:14px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:10px; color:white;">
                    <option value="">Servicio de interés</option>
                    <option value="herping">Herping</option>
                    <option value="birding">Aves</option>
                    <option value="scientific">Ciencia</option>
                    <option value="conservation">Conservación</option>
                </select>
                <textarea id="message" rows="4" placeholder="Mensaje" required style="padding:14px; background:var(--bg-primary); border:1px solid var(--border-color); border-radius:10px; color:white;"></textarea>
                
                <button type="submit" style="width:100%; padding:14px; background:var(--accent-green); border:none; border-radius:10px; color:var(--bg-primary); font-weight:600; margin-top:8px;">
                    <i class="fas fa-paper-plane"></i> Enviar
                </button>
            </form>
            <div id="formMessage" style="margin-top:12px; padding:10px; border-radius:8px; text-align:center;"></div>
        </div>

        <div style="background:var(--bg-card); border-radius:12px; padding:16px; margin-bottom:20px; border:1px solid var(--border-color);">
            <div style="display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border-color);">
                <i class="fas fa-phone-alt" style="width:24px; color:var(--accent-green);"></i>
                <a href="#" onclick="makePhoneCall('+50672565865'); return false;" style="color:white; text-decoration:none;">+506 7256 5865</a>
            </div>
            <div style="display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border-color);">
                <i class="fab fa-whatsapp" style="width:24px; color:#25D366;"></i>
                <a href="#" onclick="openWhatsApp(); return false;" style="color:white; text-decoration:none;">+506 7256 5865 (WhatsApp)</a>
            </div>
            <div style="display:flex; align-items:center; gap:12px; padding:10px 0;">
                <i class="fas fa-envelope" style="width:24px; color:var(--accent-green);"></i>
                <a href="#" onclick="sendEmail(); return false;" style="color:white; text-decoration:none;">crlifewildtours@gmail.com</a>
            </div>
        </div>

        <div style="text-align:center; padding:16px; background:var(--bg-card); border-radius:12px; margin-bottom:20px; border:1px solid var(--border-color);">
            <h4 style="margin-bottom:16px; color:var(--text-secondary);">Síguenos en redes</h4>
            <div style="display:flex; justify-content:center; gap:20px;">
                <a href="#" onclick="openFacebook(); return false;" style="width:48px; height:48px; border-radius:24px; background:#1877f2; display:flex; align-items:center; justify-content:center; color:white; font-size:1.5rem; text-decoration:none;">
                    <i class="fab fa-facebook-f"></i>
                </a>
                <a href="#" onclick="openInstagram(); return false;" style="width:48px; height:48px; border-radius:24px; background:linear-gradient(45deg,#f09433,#d62976,#962fbf,#4f5bd5); display:flex; align-items:center; justify-content:center; color:white; font-size:1.5rem; text-decoration:none;">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="#" onclick="openYouTube(); return false;" style="width:48px; height:48px; border-radius:24px; background:#ff0000; display:flex; align-items:center; justify-content:center; color:white; font-size:1.5rem; text-decoration:none;">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>

        <div style="border-radius:12px; overflow:hidden; border:1px solid var(--border-color); margin-bottom:20px;">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d125415.3461256789!2d-84.1234567!3d10.1234567!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTDCsDA3JzI0LjQiTiA4NMKwMDcnMTIuNCJX!5e0!3m2!1ses!2scr!4v1234567890" width="100%" height="200" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <a href="#" onclick="openWhatsApp(); return false;" class="whatsapp-button">
            <i class="fab fa-whatsapp"></i>
        </a>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Inicio</span>
        </a>
        <a href="services.html" class="nav-item">
            <i class="fas fa-tree"></i>
            <span>Servicios</span>
        </a>
        <a href="gallery.html" class="nav-item">
            <i class="fas fa-images"></i>
            <span>Galería</span>
        </a>
        <a href="contact.html" class="nav-item active">
            <i class="fas fa-envelope"></i>
            <span>Contacto</span>
        </a>
    </nav>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/script.js"></script>
    <script type="text/javascript" src="js/cordova-app.js"></script>
</body>
</html>
